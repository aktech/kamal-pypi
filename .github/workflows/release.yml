name: Build and Release Kamal

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      kamal_version:
        description: "Kamal version to package (e.g. 2.10.1)"
        required: true
        type: string

jobs:
  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux-amd64
          - runner: ubuntu-24.04-arm
            platform: linux-arm64

    runs-on: ${{ matrix.runner }}
    container: ghcr.io/tamatebako/tebako-ubuntu-20.04:latest

    steps:
      - name: Set version
        run: |
          if [ -n "${{ inputs.kamal_version }}" ]; then
            VERSION="${{ inputs.kamal_version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          # Strip .postN suffix for upstream Kamal git tag
          echo "KAMAL_REF=v${VERSION%.post*}" >> "$GITHUB_ENV"

      - name: Checkout kamal-pypi
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Checkout Kamal source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: basecamp/kamal
          ref: ${{ env.KAMAL_REF }}
          path: kamal-src

      - name: Setup uv
        uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a # v7.4.0

      - name: Install ruby-to-wheel
        run: uv tool install "ruby-to-wheel @ git+https://github.com/aktech/ruby-to-wheel.git"

      - name: Prepare Gemfile.lock for tebako
        run: |
          cd kamal-src
          bundle lock --add-platform $(ruby -e "puts RUBY_PLATFORM")
          # Tebako requires bundler >= 2.4.22; directly patch BUNDLED WITH version
          sed -i '/BUNDLED WITH/{n;s/.*/   2.5.23/}' Gemfile.lock
          echo "Patched Gemfile.lock:"
          tail -5 Gemfile.lock

      - name: Find libyaml
        run: |
          LIBYAML=$(find / -name 'libyaml*.so*' -not -name '*.a' 2>/dev/null | head -1)
          echo "Found libyaml: $LIBYAML"
          echo "LIBYAML_PATH=$LIBYAML" >> "$GITHUB_ENV"

      - name: Build wheel
        run: |
          ruby-to-wheel \
            --name kamal \
            --version ${{ env.VERSION }} \
            --source kamal-src \
            --source-entry-point kamal \
            --platform ${{ matrix.platform }} \
            --extra-lib "${{ env.LIBYAML_PATH }}" \
            --description "Deploy web apps anywhere" \
            --author "Basecamp" \
            --url "https://github.com/basecamp/kamal" \
            --license "MIT" \
            --readme kamal-src/README.md

      - name: Upload wheel
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: wheel-${{ matrix.platform }}
          path: dist/*.whl

  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            platform: darwin-arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Set version
        run: |
          if [ -n "${{ inputs.kamal_version }}" ]; then
            VERSION="${{ inputs.kamal_version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          # Strip .postN suffix for upstream Kamal git tag
          echo "KAMAL_REF=v${VERSION%.post*}" >> "$GITHUB_ENV"

      - name: Checkout kamal-pypi
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Checkout Kamal source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: basecamp/kamal
          ref: ${{ env.KAMAL_REF }}
          path: kamal-src

      - name: Install tebako dependencies
        run: brew install bison flex binutils libffi double-conversion boost jemalloc fmt glog gnu-sed bash zlib ncurses pkg-config

      - name: Install tebako
        run: gem install tebako

      - name: Setup uv
        uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a # v7.4.0

      - name: Install ruby-to-wheel
        run: uv tool install "ruby-to-wheel @ git+https://github.com/aktech/ruby-to-wheel.git"

      - name: Prepare Gemfile.lock for tebako
        run: |
          cd kamal-src
          bundle lock --add-platform $(ruby -e "puts RUBY_PLATFORM")
          # Tebako requires bundler >= 2.4.22; directly patch BUNDLED WITH version
          sed -i '' '/BUNDLED WITH/{n;s/.*/   2.5.23/;}' Gemfile.lock
          echo "Patched Gemfile.lock:"
          tail -5 Gemfile.lock

      - name: Find libyaml
        run: |
          LIBYAML=$(find /opt/homebrew /usr/local -name 'libyaml*.dylib' 2>/dev/null | head -1)
          echo "Found libyaml: $LIBYAML"
          echo "LIBYAML_PATH=$LIBYAML" >> "$GITHUB_ENV"

      - name: Build wheel
        run: |
          ruby-to-wheel \
            --name kamal \
            --version ${{ env.VERSION }} \
            --source kamal-src \
            --source-entry-point kamal \
            --platform ${{ matrix.platform }} \
            --extra-lib "${{ env.LIBYAML_PATH }}" \
            --description "Deploy web apps anywhere" \
            --author "Basecamp" \
            --url "https://github.com/basecamp/kamal" \
            --license "MIT" \
            --readme kamal-src/README.md

      - name: Upload wheel
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: wheel-${{ matrix.platform }}
          path: dist/*.whl

  publish:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: wheel-*
          path: dist
          merge-multiple: true

      - name: List wheels
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          verbose: true

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          files: dist/*.whl
