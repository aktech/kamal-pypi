name: Build and Release Kamal

on:
  workflow_dispatch:
    inputs:
      kamal_version:
        description: "Kamal version to package (e.g. 2.10.1)"
        required: true
        type: string

jobs:
  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux-amd64
          - runner: ubuntu-24.04-arm
            platform: linux-arm64

    runs-on: ${{ matrix.runner }}
    container: ghcr.io/tamatebako/tebako-ubuntu-20.04:latest

    steps:
      - name: Checkout kamal-pypi
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Checkout Kamal source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: basecamp/kamal
          ref: v${{ inputs.kamal_version }}
          path: kamal-src

      - name: Setup uv
        uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a # v7.4.0

      - name: Install ruby-to-wheel
        run: uv tool install "ruby-to-wheel @ git+https://github.com/aktech/ruby-to-wheel.git"

      - name: Prepare Gemfile.lock for tebako
        run: |
          cd kamal-src
          bundle lock --add-platform $(ruby -e "puts RUBY_PLATFORM")
          # Tebako requires bundler >= 2.4.22; directly patch BUNDLED WITH version
          sed -i '/BUNDLED WITH/{n;s/.*/   2.5.23/}' Gemfile.lock
          echo "Patched Gemfile.lock:"
          tail -5 Gemfile.lock

      - name: Build wheel
        run: |
          ruby-to-wheel \
            --name kamal \
            --version ${{ inputs.kamal_version }} \
            --source kamal-src \
            --source-entry-point kamal \
            --platform ${{ matrix.platform }} \
            --description "Deploy web apps anywhere" \
            --author "Basecamp" \
            --url "https://github.com/basecamp/kamal" \
            --license "MIT" \
            --readme kamal-src/README.md

      - name: Upload wheel
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: wheel-${{ matrix.platform }}
          path: dist/*.whl

  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            platform: darwin-arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout kamal-pypi
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Checkout Kamal source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: basecamp/kamal
          ref: v${{ inputs.kamal_version }}
          path: kamal-src

      - name: Install tebako dependencies
        run: brew install bison flex binutils libffi double-conversion boost jemalloc fmt glog gnu-sed bash zlib ncurses pkg-config

      - name: Install tebako
        run: gem install tebako

      - name: Setup uv
        uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a # v7.4.0

      - name: Install ruby-to-wheel
        run: uv tool install "ruby-to-wheel @ git+https://github.com/aktech/ruby-to-wheel.git"

      - name: Prepare Gemfile.lock for tebako
        run: |
          cd kamal-src
          bundle lock --add-platform $(ruby -e "puts RUBY_PLATFORM")
          # Tebako requires bundler >= 2.4.22; directly patch BUNDLED WITH version
          sed -i '' '/BUNDLED WITH/{n;s/.*/   2.5.23/;}' Gemfile.lock
          echo "Patched Gemfile.lock:"
          tail -5 Gemfile.lock

      - name: Build wheel
        run: |
          ruby-to-wheel \
            --name kamal \
            --version ${{ inputs.kamal_version }} \
            --source kamal-src \
            --source-entry-point kamal \
            --platform ${{ matrix.platform }} \
            --description "Deploy web apps anywhere" \
            --author "Basecamp" \
            --url "https://github.com/basecamp/kamal" \
            --license "MIT" \
            --readme kamal-src/README.md

      - name: Upload wheel
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: wheel-${{ matrix.platform }}
          path: dist/*.whl

  publish:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: wheel-*
          path: dist
          merge-multiple: true

      - name: List wheels
        run: ls -la dist/

      - name: Publish to Test PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          repository-url: https://test.pypi.org/legacy/
          verbose: true
          skip-existing: true
